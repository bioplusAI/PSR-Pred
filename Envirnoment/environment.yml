name: PSR
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pip=25.0
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.11.4
  - scikit-learn=1.4.2
  - matplotlib=3.8.4
  - seaborn=0.13.2

  # 🔥 PyTorch with GPU support
