      - datasets==2.19.1
      - huggingface-hub==0.23.4
      - accelerate==0.30.1
      - biopython==1.83
      - tqdm==4.66.4
      - tokenizers==0.13.3
      - safetensors==0.4.3
      - xgboost==2.0.3
      - shap==0.44.1